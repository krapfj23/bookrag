  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  @keyframes brPulse { 0% { box-shadow: 0 0 0 0 currentColor; opacity: 1; } 70% { box-shadow: 0 0 0 6px transparent; opacity: .65; } 100% { box-shadow: 0 0 0 0 transparent; opacity: 1; } }
  @keyframes brBlink { 50% { opacity: 0; } }
  .br-tt:hover .br-tt-bubble { opacity: 1 !important; }
  /* Tweaks panel */
  .tw-panel { position: fixed; right: 20px; bottom: 20px; z-index: 1000;
    background: #fff; border: 1px solid #e5e0d4; border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12); padding: 16px 18px; width: 260px;
    font-family: "IBM Plex Sans", sans-serif; font-size: 13; color: #201C16;
    display: none; }
  .tw-panel.open { display: block; }
  .tw-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .tw-row label { font-size: 11px; letter-spacing: .4px; text-transform: uppercase; color: #6B6256; }
  .tw-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .tw-chip { padding: 5px 10px; border-radius: 999px; border: 1px solid #e5e0d4;
    background: #faf7f1; font-size: 12px; cursor: pointer; font-family: inherit; color: inherit; transition: all .15s; }
  .tw-chip.on { background: #201C16; color: #F4F1EA; border-color: #201C16; }
  .tw-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; letter-spacing: -.1px; }
  .tw-swatch { width: 18px; height: 18px; border-radius: 999px; display: inline-block; margin-right: 4px; vertical-align: middle; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); }
</style>

  <script>
    /*EDITMODE-BEGIN*/
    const TWEAKS_DEFAULTS = {
      "accent": "sage",
      "paper": "linen",
      "density": "comfortable",
      "radii": "balanced"
    };
    /*EDITMODE-END*/

    function applyTweaks(t) {
      document.documentElement.dataset.accent = t.accent;
      document.documentElement.dataset.paper = t.paper;
      document.documentElement.dataset.density = t.density;
      document.documentElement.dataset.radii = t.radii;
      document.querySelectorAll('.tw-chips').forEach(group => {
        const key = group.id.replace('tw','').toLowerCase();
        group.querySelectorAll('.tw-chip').forEach(c => c.classList.toggle('on', c.dataset.v === t[key]));
      });
    }
    const tweaks = { ...TWEAKS_DEFAULTS, ...JSON.parse(localStorage.getItem('br.tweaks') || '{}') };
    applyTweaks(tweaks);

    // Tweaks host protocol
    let tweaksOn = false;
    window.addEventListener('message', (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') { tweaksOn = true; document.getElementById('twPanel').classList.add('open'); }
      if (d.type === '__deactivate_edit_mode') { tweaksOn = false; document.getElementById('twPanel').classList.remove('open'); }
    });
    window.parent && window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    document.querySelectorAll('.tw-chips').forEach(group => {
      const key = group.id.replace('tw','').toLowerCase();
      group.addEventListener('click', (ev) => {
        const btn = ev.target.closest('.tw-chip'); if (!btn) return;
        tweaks[key] = btn.dataset.v;
        localStorage.setItem('br.tweaks', JSON.stringify(tweaks));
        applyTweaks(tweaks);
        window.parent && window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: btn.dataset.v } }, '*');
      });
    });
  </script>

    const StatusArtboard = () => (
      <Frame width={540} height={440}>
        <div style={{ fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: 1.6, textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 14 }}>Pipeline status</div>
        <Row gap={8} style={{ marginBottom: 22, flexWrap: 'wrap' }}>
          <StatusBadge state="idle"/>
          <StatusBadge state="queued"/>
          <StatusBadge state="running"/>
          <StatusBadge state="done"/>
          <StatusBadge state="error"/>
        </Row>
        <div>
          <PipelineRow stage="Parse EPUB" desc="Chapter segmentation" meta="0.4s" state="done"/>
          <PipelineRow stage="Run BookNLP" desc="Entities, coref, quotes" meta="38s" state="done"/>
          <PipelineRow stage="Discover ontology" desc="BERTopic → OWL" meta="Stave 3 of 5" state="running"/>
          <PipelineRow stage="Cognee batches" desc="Claude extracts entities" meta="—" state="idle"/>
        </div>
      </Frame>
    );

    const TooltipLockArtboard = () => (
      <Frame width={520} height={320}>
        <div style={{ fontFamily: 'var(--sans)', fontSize: 11, letterSpacing: 1.6, textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 14 }}>Tooltip & lock states</div>

        <div style={{ fontFamily: 'var(--sans)', fontSize: 12, color: 'var(--ink-2)', marginBottom: 8 }}>Tooltip (hover on these)</div>
        <Row gap={20} style={{ marginBottom: 28, padding: '18px 0' }}>
          <Tooltip content="Highlight selection"><IconBtn><IcHighlight/></IconBtn></Tooltip>
          <Tooltip content="Copy quote"><IconBtn><IcCopy/></IconBtn></Tooltip>
          <Tooltip content="Ask BookRAG about this"><IconBtn><IcSpark/></IconBtn></Tooltip>
        </Row>

        <div style={{ fontFamily: 'var(--sans)', fontSize: 12, color: 'var(--ink-2)', marginBottom: 10 }}>Lock states</div>
        <Stack gap={10}>
          <LockState state="locked"/>
          <LockState state="unlocked"/>
          <LockState state="current"/>
          <LockState state="spoilerSafe" label="Spoiler-safe through p. 48"/>
        </Stack>
      </Frame>
    );

    // ── Screen artboards (full screens) ────────────────────────────
    const LibraryAB = () => <Frame width={1040} height={820} pad={0}><LibraryScreen/></Frame>;
    const ReadingAB = () => <Frame width={1440} height={900} pad={0}><ReadingScreen/></Frame>;
    const UploadAB  = () => <Frame width={1040} height={900} pad={0}><UploadScreen/></Frame>;

    // ── Canvas ─────────────────────────────────────────────────────
    const App = () => (
      <DesignCanvas>
        <DCSection id="foundations" title="Foundations" subtitle="Color, type, space — the materials.">
          <DCArtboard id="colors-light" label="Palette · light" width={520} height={560}><ColorsArtboard theme="light"/></DCArtboard>
          <DCArtboard id="colors-dark"  label="Palette · dark"  width={520} height={560}><ColorsArtboard theme="dark"/></DCArtboard>
          <DCArtboard id="type" label="Typography" width={620} height={660}><TypographyArtboard/></DCArtboard>
          <DCArtboard id="space" label="Space · radii · shadow" width={520} height={480}><SpacingRadiiArtboard/></DCArtboard>
        </DCSection>

        <DCSection id="chrome" title="Chrome" subtitle="Nav, buttons, inputs — the UI surface.">
          <DCArtboard id="nav-light" label="Top nav · light" width={1040} height={112}><NavArtboard theme="light"/></DCArtboard>
          <DCArtboard id="nav-dark"  label="Top nav · dark"  width={1040} height={112}><NavArtboard theme="dark"/></DCArtboard>
          <DCArtboard id="buttons" label="Buttons" width={540} height={340}><ButtonsArtboard/></DCArtboard>
          <DCArtboard id="inputs" label="Form inputs" width={520} height={440}><InputsArtboard/></DCArtboard>
          <DCArtboard id="tooltip-lock" label="Tooltip · lock states" width={520} height={320}><TooltipLockArtboard/></DCArtboard>
        </DCSection>

        <DCSection id="library" title="Library" subtitle="Books, chapters, progress — the shelf.">
          <DCArtboard id="bookcard" label="Book card" width={540} height={460}><BookCardArtboard/></DCArtboard>
          <DCArtboard id="chapters" label="Chapter rows" width={480} height={360}><ChapterRowArtboard/></DCArtboard>
          <DCArtboard id="progress" label="Progress pill" width={420} height={240}><ProgressPillArtboard/></DCArtboard>
        </DCSection>

        <DCSection id="reading" title="Reading & chat" subtitle="The core experience — prose, highlights, the spoiler veil, margin notes.">
          <DCArtboard id="highlights" label="Highlight & selection states" width={520} height={400}><HighlightArtboard/></DCArtboard>
          <DCArtboard id="blur" label="Progressive blur overlay" width={520} height={460}><BlurArtboard/></DCArtboard>
          <DCArtboard id="chat" label="Chat bubbles" width={560} height={560}><ChatArtboard/></DCArtboard>
        </DCSection>

        <DCSection id="upload" title="Ingestion" subtitle="Dropzone and pipeline — long-running work, stated calmly.">
          <DCArtboard id="dropzone" label="Dropzone" width={540} height={340}><DropzoneArtboard/></DCArtboard>
          <DCArtboard id="pipeline" label="Pipeline status" width={540} height={440}><StatusArtboard/></DCArtboard>
        </DCSection>

        <DCSection id="screens" title="Screens in use" subtitle="The system composed — click any to focus.">
          <DCArtboard id="screen-library" label="Library" width={1040} height={820}><LibraryAB/></DCArtboard>
          <DCArtboard id="screen-reading" label="Reading + chat" width={1440} height={900}><ReadingAB/></DCArtboard>
          <DCArtboard id="screen-upload" label="Upload + pipeline" width={1040} height={900}><UploadAB/></DCArtboard>
        </DCSection>

        <DCPostIt top={20} left={60} rotate={-1.5}>
          All components built from scratch — no existing frontend. Use as reference for the Next.js build.
        </DCPostIt>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
